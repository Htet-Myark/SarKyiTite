services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/library
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - MAILTRAP_USER=${MAILTRAP_USER:-}
      - MAILTRAP_PASS=${MAILTRAP_PASS:-}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
